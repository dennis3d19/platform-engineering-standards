---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-tst
  labels:
    team: platform
    environment: tst
    managed-by: terraform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-tst-quota
  namespace: platform-tst
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: platform-tst-limits
  namespace: platform-tst
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "4Gi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-sa
  namespace: platform-tst
  labels:
    app: platform
    environment: tst
    managed-by: kubernetes
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-reader
  namespace: platform-tst
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-reader-binding
  namespace: platform-tst
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-reader
subjects:
  - kind: ServiceAccount
    name: platform-sa
    namespace: platform-tst
---
# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: platform-tst
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: platform-tst
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
