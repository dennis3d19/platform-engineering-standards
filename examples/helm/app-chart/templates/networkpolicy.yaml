{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app-chart.fullname" . }}-deny-all
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app-chart.fullname" . }}-allow-dns
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.networkPolicy.ingress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app-chart.fullname" . }}-ingress
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
{{- end }}
{{- if .Values.networkPolicy.egress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app-chart.fullname" . }}-egress
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
{{- end }}
{{- end }}
