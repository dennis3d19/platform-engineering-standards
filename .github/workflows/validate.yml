---
name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: yamllint .

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.41.0

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git

  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          ignore_paths: ".git node_modules .terraform"

      - name: Install shfmt
        run: |
          curl -sSLo /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64"
          chmod +x /usr/local/bin/shfmt

      - name: Run shfmt
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -exec shfmt -d -i 2 -ci {} +

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate JSON files
        run: |
          find . -name "*.json" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" | while read -r f; do
            echo "Validating: $f"
            python3 -m json.tool "$f" > /dev/null
          done

  validate-github-workflows:
    name: Validate GitHub Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install check-jsonschema
        run: pip install check-jsonschema==0.28.4

      - name: Validate GitHub Actions workflows
        run: check-jsonschema --schemafile https://json.schemastore.org/github-workflow.json .github/workflows/*.yml

  security-secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan \
            --exclude-files '\.git/.*' \
            --exclude-files 'node_modules/.*' \
            > /tmp/secrets-results.json
          if python3 -c "
          import json, sys
          with open('/tmp/secrets-results.json') as f:
              results = json.load(f)
          results_map = results.get('results', {})
          if results_map:
              print('Potential secrets found:')
              for fname, secrets in results_map.items():
                  for s in secrets:
                      print(f'  {fname}:{s[\"line_number\"]} - {s[\"type\"]}')
              sys.exit(1)
          else:
              print('No secrets detected.')
          "; then
            echo "Secret scan passed."
          fi

  security-checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          compact: true
          output_format: cli,sarif
          output_file_path: console,results.sarif
          skip_check: CKV_GIT_1,CKV2_GIT_1
          soft_fail: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true

  test-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Validate example YAML files
        run: |
          find examples/ -name "*.yaml" -o -name "*.yml" | \
            xargs -I{} yamllint {}

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp/
          mv /tmp/kubeconform /usr/local/bin/kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Validate Kubernetes manifests
        run: |
          find examples/kubernetes/ -name "*.yaml" -o -name "*.yml" | \
            xargs -I{} kubeconform \
              -strict \
              -summary \
              -kubernetes-version 1.29.0 \
              {}

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pyyaml

      - name: Run tests
        run: |
          if find tests/ -name "test_*.py" | grep -q .; then
            pytest tests/ -v --tb=short
          else
            echo "No Python tests found, skipping."
          fi

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs:
      - lint-yaml
      - lint-markdown
      - lint-shell
      - validate-json
      - validate-github-workflows
      - security-secrets
      - security-checkov
      - test-examples
      - test-python
      - pre-commit
    if: always()
    steps:
      - name: Check all jobs
        run: |
          results=(
            "lint-yaml:${{ needs.lint-yaml.result }}"
            "lint-markdown:${{ needs.lint-markdown.result }}"
            "lint-shell:${{ needs.lint-shell.result }}"
            "validate-json:${{ needs.validate-json.result }}"
            "validate-github-workflows:${{ needs.validate-github-workflows.result }}"
            "security-secrets:${{ needs.security-secrets.result }}"
            "security-checkov:${{ needs.security-checkov.result }}"
            "test-examples:${{ needs.test-examples.result }}"
            "test-python:${{ needs.test-python.result }}"
            "pre-commit:${{ needs.pre-commit.result }}"
          )
          failed=0
          echo "## Validation Summary"
          for result in "${results[@]}"; do
            job="${result%%:*}"
            status="${result##*:}"
            if [[ "$status" == "success" ]]; then
              echo "✅ $job: $status"
            elif [[ "$status" == "skipped" ]]; then
              echo "⏭️  $job: $status"
            else
              echo "❌ $job: $status"
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "One or more validation jobs failed."
            exit 1
          fi
